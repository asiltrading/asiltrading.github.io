<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/png" href="{{ '/assets/img/favicon.png' | relative_url }}">
  <link rel="apple-touch-icon" href="{{ '/assets/img/favicon.png' | relative_url }}">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600&family=Plus+Jakarta+Sans:wght@400;500&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">

  {%- seo -%}

  {%- comment -%} Organization JSON-LD for richer search/AI results {%- endcomment -%}
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Organization",
    "name": "{{ site.company.legal_name }}",
    "url": "{{ site.url }}",
    "logo": "{{ site.url }}{{ '/assets/img/logo.png' | relative_url }}",
    "email": "{{ site.email }}",
    "address": {
      "@type": "PostalAddress",
      "streetAddress": "Office 35786–001, IFZA Business Park, DDP",
      "addressLocality": "Dubai",
      "addressCountry": "AE"
    },
    "vatID": "{{ site.company.trn }}",
    "description": "{{ site.description | strip_newlines | strip }}"
  }
  </script>
</head>

title: "Asil Trading FZCO"
tagline: "Maritime Spare Parts, Dubai"
description: >-
  Asil Trading is a Dubai-based B2B supplier of maritime and industrial spare parts.
  Emergency sourcing, obsolete parts, and full logistics management. IFZA registered.
url: "https://asiltrading.com"
email: "contact@asiltrading.com"
locale: "en_AE"
timezone: "Asia/Dubai"

company:
  legal_name: "Asil Trading FZCO"
  address: "Office 35786-001, IFZA Business Park, DDP, Dubai, UAE"
  phone: "+971 4 216 0792"
  trn: "104165890500001"
  customs_code: "AE-1183222"
  eori: "NL827475391"

social:
  email: "contact@asiltrading.com"

# SEO defaults consumed by jekyll-seo-tag
logo: "/assets/img/logo.png"

# Collections
collections:
  parts:
    output: true
    permalink: /parts/:slug/
  parts_ru:
    output: true
    permalink: /ru/parts/:slug/

defaults:
  - scope:
      path: ""
    values:
      image: "/assets/img/og-image.png"   # og:image on every page via jekyll-seo-tag
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "page"
  - scope:
      path: ""
      type: "parts"
    values:
      layout: "parts"
      lang: "en"
  - scope:
      path: ""
      type: "parts_ru"
    values:
      layout: "parts"
      lang: "ru"
  - scope:
      path: "ru"
    values:
      lang: "ru"
      image: "/assets/img/og-image-ru.png"

# Plugins (all GitHub-Pages-safe)
plugins:
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-redirect-from

# Build
markdown: kramdown
highlighter: rouge
sass:
  style: compressed

exclude:
  - Gemfile
  - Gemfile.lock
  - vendor
  - node_modules
  - README.md
  - "*.gem"
  - tools

# Parts catalog categories (used by filter UI)
part_categories:
  - Engine
  - Pumps & Valves
  - Navigation & Electronics
  - Electrical
  - Auxiliary Equipment
  - Deck Equipment
